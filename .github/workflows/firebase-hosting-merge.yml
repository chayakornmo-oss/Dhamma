# This file was auto-generated by the Firebase CLI
# Modified to support Flutter Web Build 2026

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. ติดตั้ง Flutter SDK (เวอร์ชันล่าสุด)
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 2. ดึง Library ที่โปรเจกต์ต้องใช้
      - name: Install dependencies
        run: flutter pub get

      # 3. เสกไฟล์ env.txt จากตู้เซฟ GitHub
      - name: Create env.txt file
        run: echo "${{ secrets.ENV_FILE }}" > env.txt

      # 4. ปั่นไฟล์สำหรับ Web (Release mode)
      - name: Build Web
        run: flutter build web --release

      # 5. ส่งขึ้น Firebase Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DHAMMA_65BDE }}
          channelId: live
          projectId: dhamma-65bde