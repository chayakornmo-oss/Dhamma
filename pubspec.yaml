name: dhamma_plus
description: "ธรรมะ+ — AI-powered Spiritual Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

  # State Management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Auth Providers
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # UI
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Local Storage
  shared_preferences: ^2.2.0

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # HTTP
  http: ^1.2.0

  # Audio
  just_audio: ^0.9.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  cached_network_image: ^3.3.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.0

  # Charts
  fl_chart: ^0.68.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - env.txt
